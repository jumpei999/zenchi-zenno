name: Release

# Manual only until intentional 0.x releases; push-to-main auto-release disabled
# after accidental 1.0.0 publish.
on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT (repo secret) so @semantic-release/git can push version commits
          # past the main ruleset; default GITHUB_TOKEN cannot bypass.
          persist-credentials: true
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # Publishing uses npm Trusted Publishing (OIDC): pnpm 11 exchanges the
      # id-token for a short-lived npm credential per package, so no NPM_TOKEN
      # secret is needed. Requires `id-token: write` above and a Trusted
      # Publisher configured for each @zenchi-zenno/* package on npmjs.com.
      # HUSKY=0 skips local hooks; DCO sign-off is in release.config.cjs.
      # RELEASE_GITHUB_TOKEN: fine-grained PAT (Token name zenchi-zenno-release)
      # whose owner is Exempt on the main ruleset Bypass list.
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          HUSKY: 0
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: pnpm release
