name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint commit messages
        if: github.event_name == 'pull_request'
        run: pnpm commitlint --from origin/${{ github.base_ref }} --to HEAD --verbose

      - name: Check format and lint
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
